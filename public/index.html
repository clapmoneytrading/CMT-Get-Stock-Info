<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clap Money Trading</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="landing-page">
    <div class="background-orbit"></div>
    <div class="background-grid"></div>

    <header class="hero">
      <div>
        <p class="eyebrow">Clap Money Trading</p>
        <h1>Clap Money Trading</h1>
        <p class="subhead">
          Search a stock and instantly view core ratings with the latest 4 quarterly earnings.
        </p>
        <a class="nav-button" href="/dashboard.html">Open Dashboard</a>
      </div>
      <div class="hero-card brand-card">
        <img
          id="brand-logo"
          class="brand-logo"
          src="/logo.png"
          alt="Clap Money Trading Logo"
          onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block';"
        />
        <div id="logo-fallback" class="logo-fallback" style="display: none;">
          CMT
        </div>
      </div>
    </header>

    <main>
      <section class="panel search-panel">
        <form id="lookup-form">
          <label for="query">Stock name / symbol</label>
          <div class="input-row">
            <input id="query" name="query" type="text" placeholder="TCS, HDFC, Reliance" required />
            <button type="submit">Search</button>
          </div>
          <p id="status" class="status"></p>
        </form>
      </section>

      <section id="result-panel" class="panel lookup-result" style="display: none;">
        <div class="panel-header">
          <div>
            <p class="panel-eyebrow">Search Result</p>
            <h2 id="result-stock-name">-</h2>
            <p id="result-stock-price" class="result-stock-price">-</p>
          </div>
          <p class="panel-helper" id="result-source">Latest live data</p>
        </div>

        <div id="summary-grid" class="preview-body"></div>

        <h3 class="table-title">Quarterly Earnings (INR)</h3>
        <div class="table-wrap">
          <table class="quarterly-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>EPS</th>
                <th>%Chg</th>
                <th>Sales(Cr)</th>
                <th>%Chg</th>
              </tr>
            </thead>
            <tbody id="quarterly-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer>
      <p>Clap Money Trading • Trade with discipline</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
